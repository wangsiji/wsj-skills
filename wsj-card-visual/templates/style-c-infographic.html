<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0b0b12;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 36px 14px;
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
  }
  .card {
    max-width: 500px;
    width: 100%;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  .head {
    background: linear-gradient(160deg, #201535 0%, #352552 45%, #2d1d45 100%);
    padding: 32px 28px 20px;
  }
  .head-top {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
  }
  .head-top .badge {
    font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
    color: #b8a4d0; background: rgba(255,255,255,0.07);
    padding: 3px 8px; border-radius: 4px;
  }
  .head-top .num { font-size: 9px; color: #7a6a90; letter-spacing: 1px; }
  .head h1 {
    font-size: 26px; font-weight: 800; color: #f0eaf8;
    line-height: 1.2; letter-spacing: 0.5px; margin-bottom: 2px;
  }
  .head .sub { font-size: 10px; color: #9a8aaa; letter-spacing: 2px; }
  .sec {
    padding: 20px 24px 18px;
  }
  .sec + .sec { border-top: 1px solid #f0eef5; }
  .sec-title {
    display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
  }
  .sec-title .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .sec-title span { font-size: 12px; font-weight: 700; color: #2a2a3a; letter-spacing: 0.5px; }
  .item {
    background: #f8f7fb; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
  }
  .item:last-child { margin-bottom: 0; }
  .item-row { display: flex; align-items: flex-start; gap: 10px; }
  .item-icon {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .item-content { flex: 1; min-width: 0; }
  .item-content .il { font-size: 11.5px; font-weight: 700; color: #2a2a3a; margin-bottom: 3px; }
  .item-content ul { list-style: none; padding-left: 4px; }
  .item-content ul li {
    font-size: 10.5px; color: #6a6a7a; line-height: 1.6;
    padding-left: 10px; position: relative;
  }
  .item-content ul li::before {
    content: ''; position: absolute; left: 0; top: 7px;
    width: 3px; height: 3px; border-radius: 50%; background: #b8b0c8;
  }
  .flow-step {
    background: #f8f7fb; border-radius: 10px; padding: 11px 14px;
    margin-bottom: 7px; display: flex; align-items: flex-start; gap: 10px;
  }
  .flow-step:last-child { margin-bottom: 0; }
  .step-icon {
    width: 22px; height: 22px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff;
    flex-shrink: 0; margin-top: 1px;
  }
  .step-body { flex: 1; }
  .step-body .sl { font-size: 11.5px; font-weight: 700; color: #2a2a3a; margin-bottom: 2px; }
  .step-body ul { list-style: none; padding-left: 0; }
  .step-body ul li {
    font-size: 10px; color: #6a6a7a; line-height: 1.5;
    padding-left: 8px; position: relative;
  }
  .step-body ul li::before { content: '·'; position: absolute; left: 0; color: #a0a0b0; }
  .case-item {
    display: flex; align-items: center; gap: 12px;
    background: #f8f7fb; border-radius: 10px; padding: 10px 14px; margin-bottom: 7px;
  }
  .case-item:last-child { margin-bottom: 0; }
  .case-icon {
    width: 30px; height: 30px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0;
  }
  .case-body { flex: 1; }
  .case-body strong { font-size: 11px; color: #2a2a3a; display: block; margin-bottom: 1px; }
  .case-body p { font-size: 10px; color: #6a6a7a; line-height: 1.4; }
  .quote-box { text-align: center; padding: 14px; }
  .quote-box p {
    font-size: 11px; color: #6a5a7a; line-height: 1.7; font-style: italic;
    max-width: 90%; margin: 0 auto;
  }
  .bottom-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .bg-item {
    background: #f8f7fb; border-radius: 10px; padding: 12px 8px; text-align: center;
  }
  .bg-item .bg-ic { font-size: 18px; margin-bottom: 6px; }
  .bg-item .bg-t { font-size: 10px; font-weight: 700; color: #2a2a3a; margin-bottom: 3px; }
  .bg-item .bg-d { font-size: 9px; color: #7a7a8a; line-height: 1.4; }
  .foot {
    padding: 12px 24px; border-top: 1px solid #eee;
    text-align: center; font-size: 9px; color: #a0a0b0; letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <div class="head-top">
      <span class="badge">{{TAG}}</span>
      <span class="num">NO.{{NUMBER}}</span>
    </div>
    <h1>{{TITLE}}</h1>
    <div class="sub">{{SUBTITLE}}</div>
  </div>

  <!-- 理论总述 -->
  <div class="sec">
    <div class="sec-title">
      <div class="dot" style="background:#9b7fd4;"></div>
      <span>核心闭环</span>
    </div>
    <div class="item">
      <div class="item-row">
        <div class="item-icon" style="background:#e8e0f8;">🔄</div>
        <div class="item-content">
          <div class="il">{{CORE_LOOP}}</div>
          <ul>
            {{CORE_POINTS}}
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- 分步流程 -->
  <div class="sec">
    <div class="sec-title">
      <div class="dot" style="background:#6a8fc4;"></div>
      <span>{{STEPS_TITLE}}</span>
    </div>
    {{STEPS}}
  </div>

  <!-- 使用场景 -->
  <div class="sec">
    <div class="sec-title">
      <div class="dot" style="background:#6abf8a;"></div>
      <span>使用场景</span>
    </div>
    {{SCENES}}
  </div>

  <!-- 金句 -->
  <div class="sec" style="background:#f8f5fc;">
    <div class="sec-title">
      <div class="dot" style="background:#9b7fd4;"></div>
      <span>核心洞察</span>
    </div>
    <div class="quote-box">
      <p>"{{QUOTE}}"</p>
    </div>
  </div>

  <!-- 底部三栏 -->
  <div class="sec">
    <div class="bottom-grid">
      <div class="bg-item">
        <div class="bg-ic">{{VALUE_ICON}}</div>
        <div class="bg-t">核心价值</div>
        <div class="bg-d">{{VALUE_TEXT}}</div>
      </div>
      <div class="bg-item">
        <div class="bg-ic">{{LOOP_ICON}}</div>
        <div class="bg-t">闭环流程</div>
        <div class="bg-d">{{LOOP_TEXT}}</div>
      </div>
      <div class="bg-item">
        <div class="bg-ic">{{AUDIENCE_ICON}}</div>
        <div class="bg-t">适用人群</div>
        <div class="bg-d">{{AUDIENCE_TEXT}}</div>
      </div>
    </div>
  </div>

  <div class="foot">{{FOOTER_TEXT}}</div>
</div>
</body>
</html>
